services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6334"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # 'ollama list' talks to the server — succeeds only when Ollama is ready
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20

  dnd_rag:
    build: .
    image: dndrag-app
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6334
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: gemma2:9b
    volumes:
      - ./docs:/app/docs
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - cli

  dnd_rag_serve:
    image: dndrag-app
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6334
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: gemma2:9b
    ports:
      - "3000:3000"
    volumes:
      - ./docs:/app/docs
      - ./static:/app/static
    command: serve --port 3000
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - serve

  pdf_tools:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes:
      - .:/project
    working_dir: /project
    profiles:
      - tools

volumes:
  qdrant_data:
  ollama_data:
