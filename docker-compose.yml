services:
  ollama:
    image: ollama/ollama:latest
    ports:
      # Host-published port only; app containers reach Ollama over the Docker
      # network at http://ollama:11434 regardless of this mapping. Override
      # OLLAMA_HOST_PORT (e.g. in .env) if 11434 is taken by a native Ollama.
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # 'ollama list' talks to the server — succeeds only when Ollama is ready
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20

  dnd_rag:
    build: .
    image: dndrag-app
    env_file:
      - path: .env
        required: false
    environment:
      INDEX_PATH: /app/index/dnd_lore.idx
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      CHAT_MODEL: ${CHAT_MODEL:-gemma2:9b}
      RERANK_MODEL: ${RERANK_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-120}
    volumes:
      - ./docs:/app/docs
      - ./eval.json:/app/eval.json
      # The index is a plain file on the host. `ingest` writes it here and
      # `serve` reads the same path, which is how the two containers share it.
      - ./index:/app/index
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - cli

  dnd_rag_serve:
    image: dndrag-app
    env_file:
      - path: .env
        required: false
    environment:
      INDEX_PATH: /app/index/dnd_lore.idx
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      CHAT_MODEL: ${CHAT_MODEL:-gemma2:9b}
      RERANK_MODEL: ${RERANK_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-120}
    ports:
      - "3000:3000"
    volumes:
      - ./docs:/app/docs
      # Read-only: serve never writes the index, it only picks up re-ingests.
      - ./index:/app/index:ro
    command: serve --port 3000
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - serve

  pdf_tools:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes:
      - .:/project
    working_dir: /project
    profiles:
      - tools

volumes:
  ollama_data:
